<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>DuplexPlay Exact UI - webOS 2.2.3</title>
    <style>
        /* DUPLEXPLAY RENK PALETİ VE MİMARİSİ */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19; /* Duplex koyu lacivert arka plan */
            color: #d1d5db;
            font-family: Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .active-screen {
            display: block;
        }

        /* --- ÜST BİLGİ ÇUBUĞU (HEADER) --- */
        .header-bar {
            height: 60px;
            background-color: #111827;
            border-bottom: 2px solid #1f2937;
            padding: 0 30px;
            line-height: 60px;
        }

        .header-logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            float: left;
        }

        .header-time {
            float: right;
            font-size: 18px;
            color: #9ca3af;
        }

        /* --- BÖLÜNMÜŞ EKRAN (SPLIT UI) DÜZENİ --- */
        .container {
            width: 100%;
            height: calc(100vh - 62px); /* Header yüksekliğini çıkar */
            position: relative;
        }

        /* SOL KENAR ÇUBUĞU (Kategoriler / Gruplar) */
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            width: 30%;
            height: 100%;
            background-color: #111827;
            border-right: 2px solid #1f2937;
            box-sizing: border-box;
            overflow: hidden; /* TV'de scroll gizlenir */
        }

        /* SAĞ İÇERİK ALANI (Kanallar / Grid) */
        .content-area {
            position: absolute;
            left: 30%;
            top: 0;
            width: 70%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            background-color: #0b0f19;
        }

        /* --- LİSTE VE GRID ÖĞELERİ --- */
        .list-item {
            padding: 20px;
            font-size: 20px;
            border-bottom: 1px solid #1f2937;
            color: #ffffff;
            box-sizing: border-box;
            border-left: 5px solid transparent;
        }

        .grid-container {
            /* Eski tarayıcılar için float mantığı */
            width: 100%;
        }

        .grid-item {
            display: inline-block;
            width: 180px;
            height: 120px;
            background-color: #1f2937;
            margin: 10px;
            border-radius: 8px;
            border: 3px solid transparent;
            text-align: center;
            vertical-align: top;
            box-sizing: border-box;
            position: relative;
        }

        .grid-item span {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            font-size: 16px;
            color: #ffffff;
        }

        /* --- DUPLEXPLAY FOCUS (ODAK) TASARIMI --- */
        .focused {
            /* DuplexPlay'in karakteristik parlak mavi çerçevesi ve arka plan aydınlanması */
            border-color: #00e5ff !important; 
            background-color: #374151 !important;
            color: #ffffff;
        }

        .sidebar .focused {
            border-left: 5px solid #00e5ff !important; /* Sidebar için sol çizgi vurgusu */
            border-top: transparent !important;
            border-right: transparent !important;
            border-bottom: 1px solid #1f2937 !important;
        }

    </style>
</head>
<body>

    <div id="screen-main" class="screen active-screen">
        
        <div class="header-bar">
            <div class="header-logo">DuplexPlay Clone</div>
            <div class="header-time" id="clock">12:00</div>
        </div>

        <div class="container">
            <div class="sidebar" id="group-list">
                <div class="list-item nav-item focused" data-type="group" onclick="loadChannels('live')">Canlı TV</div>
                <div class="list-item nav-item" data-type="group" onclick="loadChannels('vod')">Filmler (VOD)</div>
                <div class="list-item nav-item" data-type="group" onclick="loadChannels('series')">Diziler</div>
                <div class="list-item nav-item" data-type="group" onclick="alert('Ayarlar')">Ayarlar</div>
            </div>

            <div class="content-area">
                <h2 id="content-title" style="margin-top:0; color:#9ca3af;">Canlı TV</h2>
                <div class="grid-container" id="channel-grid">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ES5 Kısıtlamalarına Uygun Değişkenler
        var currentFocusIndex = 0;
        var navItems = [];
        
        // Sahte API verisi (Sen bunu XMLHttpRequest ile değiştireceksin)
        var dummyData = {
            live: ['TRT 1', 'ATV', 'Kanal D', 'Show TV', 'Star TV', 'TV8', 'NTV', 'Habertürk'],
            vod: ['Matrix', 'Yüzüklerin Efendisi', 'Inception', 'Interstellar', 'Gladyatör'],
            series: ['Breaking Bad', 'Game of Thrones', 'Ezel', 'Kurtlar Vadisi']
        };

        // Tuş Kodları (webOS)
        var KEYS = { LEFT: 37, UP: 38, RIGHT: 39, DOWN: 40, ENTER: 13 };

        window.onload = function() {
            document.addEventListener('keydown', handleKeyDown);
            loadChannels('live'); // Varsayılan olarak Canlı TV'yi yükle
            updateNavItems();
            updateClock();
            setInterval(updateClock, 60000);
        };

        function updateClock() {
            var date = new Date();
            var hours = date.getHours();
            var minutes = date.getMinutes();
            if (hours < 10) hours = '0' + hours;
            if (minutes < 10) minutes = '0' + minutes;
            document.getElementById('clock').innerHTML = hours + ':' + minutes;
        }

        // --- İÇERİK YÜKLEME ---
        function loadChannels(category) {
            var grid = document.getElementById('channel-grid');
            var title = document.getElementById('content-title');
            grid.innerHTML = ''; // Temizle
            
            if (category === 'live') title.innerHTML = 'Canlı TV Kategorileri';
            if (category === 'vod') title.innerHTML = 'Filmler (VOD)';
            if (category === 'series') title.innerHTML = 'Diziler';

            var items = dummyData[category] || [];

            for (var i = 0; i < items.length; i++) {
                var itemDiv = document.createElement('div');
                itemDiv.className = 'grid-item nav-item';
                itemDiv.setAttribute('data-type', 'channel');
                itemDiv.innerHTML = '<span>' + items[i] + '</span>';
                grid.appendChild(itemDiv);
            }

            // Yeni kanallar yüklendiğinde navItems'i güncelle ama odağı sol menüde tut
            updateNavItems(true); 
        }

        // --- SPATIAL NAVIGATION (TV KUMANDA ODAĞI) ---
        function updateNavItems(keepFocusIndex) {
            var elements = document.getElementsByClassName('nav-item');
            navItems = [];
            for (var i = 0; i < elements.length; i++) {
                navItems.push(elements[i]);
            }
            if (!keepFocusIndex) currentFocusIndex = 0;
            applyFocus();
        }

        function applyFocus() {
            if (navItems.length === 0) return;
            
            for (var i = 0; i < navItems.length; i++) {
                navItems[i].className = navItems[i].className.replace(' focused', '');
            }
            
            if (currentFocusIndex < 0) currentFocusIndex = 0;
            if (currentFocusIndex >= navItems.length) currentFocusIndex = navItems.length - 1;
            
            navItems[currentFocusIndex].className += ' focused';
        }

        function handleKeyDown(e) {
            var keyCode = e.keyCode || e.which;
            var currentElement = navItems[currentFocusIndex];
            var isSidebar = currentElement.getAttribute('data-type') === 'group';

            if (keyCode === KEYS.DOWN) {
                if (isSidebar) {
                    // Sidebar'da aşağı in
                    if (currentFocusIndex < 3) currentFocusIndex++;
                } else {
                    // Grid'de aşağı in (ortalama 3 kolon)
                    currentFocusIndex += 3;
                }
                applyFocus();
                e.preventDefault();
            } 
            else if (keyCode === KEYS.UP) {
                if (isSidebar) {
                    if (currentFocusIndex > 0) currentFocusIndex--;
                } else {
                    currentFocusIndex -= 3;
                }
                applyFocus();
                e.preventDefault();
            }
            else if (keyCode === KEYS.RIGHT) {
                if (isSidebar) {
                    // Sağ menüye (Grid'e) atla
                    currentFocusIndex = 4; // Sidebar'da 4 eleman var (0,1,2,3), 4. indeks ilk kanaldır
                } else {
                    currentFocusIndex++;
                }
                applyFocus();
                e.preventDefault();
            }
            else if (keyCode === KEYS.LEFT) {
                if (!isSidebar) {
                    if (currentFocusIndex % 3 === 1) { // Eğer grid'in en solundaysa (1, 4, 7 indexleri)
                        // Sidebar'a geri dön (aktif olan gruba)
                        currentFocusIndex = 0; // Şimdilik basite indirgedik, 0'a döner
                    } else {
                        currentFocusIndex--;
                    }
                }
                applyFocus();
                e.preventDefault();
            }
            else if (keyCode === KEYS.ENTER) {
                if (currentElement) currentElement.click();
                e.preventDefault();
            }
        }
    </script>
</body>
</html>
