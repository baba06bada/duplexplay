<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DuplexPlay - Demo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0a; color:#fff; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; font-size:14px; height:100vh; overflow:hidden; user-select:none; }
        .screen { display:none; width:100%; height:100%; position:absolute; top:0; left:0; flex-direction:column; background:#0a0a0a; }
        .screen.active { display:flex; }
        #login-screen { justify-content:center; align-items:center; padding:20px; }
        .login-box { background:#1a1a1a; border-radius:8px; padding:30px 25px; max-width:400px; width:100%; box-shadow:0 0 20px rgba(0,0,0,0.8); }
        .login-box h1 { font-size:28px; font-weight:300; text-align:center; margin-bottom:20px; letter-spacing:2px; color:#00bfff; }
        .login-box label { display:block; margin:12px 0 4px; font-size:12px; color:#aaa; }
        .login-box input { width:100%; padding:10px 12px; background:#2a2a2a; border:1px solid #333; border-radius:4px; color:#fff; font-size:14px; }
        .login-box input:focus { border-color:#00bfff; outline:none; }
        .login-box .btn { width:100%; padding:12px; margin-top:20px; background:#00bfff; border:none; border-radius:4px; color:#000; font-size:16px; font-weight:bold; cursor:pointer; }
        .login-box .btn:active { background:#0099cc; }
        #login-status { text-align:center; margin-top:12px; font-size:13px; color:#6bff6b; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:12px 18px; background:#111; border-bottom:1px solid #222; flex-shrink:0; }
        .header .logo { font-size:22px; font-weight:300; color:#00bfff; letter-spacing:1px; }
        .header .time { font-size:14px; color:#aaa; }
        .header .settings-btn { background:none; border:none; color:#aaa; font-size:20px; cursor:pointer; padding:0 8px; }
        .header .settings-btn:active { color:#fff; }
        .tabs { display:flex; background:#111; border-bottom:1px solid #222; flex-shrink:0; }
        .tabs .tab { flex:1; text-align:center; padding:12px 0; font-size:14px; font-weight:500; color:#888; cursor:pointer; border-bottom:3px solid transparent; }
        .tabs .tab.active { color:#fff; border-bottom-color:#00bfff; }
        .tabs .tab:active { background:#1a1a1a; }
        .content { flex:1; overflow-y:auto; padding:12px 16px 80px; }
        .content h2 { font-size:16px; font-weight:400; margin:6px 0 12px; color:#ccc; }
        .cat-grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
        .cat-item { background:#1e1e1e; padding:10px 16px; border-radius:20px; font-size:13px; color:#ddd; cursor:pointer; border:1px solid #2a2a2a; }
        .cat-item.active { background:#00bfff; color:#000; border-color:#00bfff; }
        .cat-item:active { opacity:0.7; }
        .stream-grid { display:flex; flex-wrap:wrap; gap:12px; justify-content:flex-start; }
        .stream-card { width:calc(33.333% - 12px); background:#141414; border-radius:6px; overflow:hidden; cursor:pointer; border:1px solid #222; }
        .stream-card:active { border-color:#00bfff; }
        .stream-card .thumb { width:100%; padding-top:56.25%; background:#1a1a1a; position:relative; overflow:hidden; }
        .stream-card .thumb img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; background:#222; }
        .stream-card .info { padding:8px 10px; }
        .stream-card .info .title { font-size:13px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .stream-card .info .sub { font-size:11px; color:#777; margin-top:2px; }
        #player-screen { flex-direction:column; background:#000; }
        #player-screen .video-wrap { flex:1; background:#000; display:flex; align-items:center; justify-content:center; position:relative; }
        #player-screen video { width:100%; height:100%; max-height:70vh; background:#000; }
        #player-screen .player-controls { padding:12px 18px; background:#111; border-top:1px solid #222; }
        #player-screen .player-controls .title { font-size:16px; margin-bottom:4px; }
        #player-screen .player-controls .epg { font-size:12px; color:#888; }
        .player-close { position:absolute; top:12px; right:16px; background:rgba(0,0,0,0.6); border:none; color:#fff; font-size:22px; padding:4px 12px; border-radius:4px; cursor:pointer; z-index:10; }
        .player-close:active { background:rgba(255,0,0,0.4); }
        #settings-screen { padding:20px; }
        #settings-screen h2 { margin-bottom:20px; }
        .settings-item { padding:14px 0; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center; }
        .settings-item .label { color:#ccc; }
        .settings-item .value { color:#00bfff; }
        .settings-close { margin-top:30px; padding:12px; background:#333; border:none; color:#fff; border-radius:4px; font-size:16px; cursor:pointer; width:100%; }
        .settings-close:active { background:#444; }
        .content::-webkit-scrollbar { width:4px; }
        .content::-webkit-scrollbar-track { background:#0a0a0a; }
        .content::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }
        @media (max-width:600px) { .stream-card { width:calc(50% - 12px); } }
        @media (max-width:400px) { .stream-card { width:calc(100% - 12px); } }
        .loading { text-align:center; padding:40px 0; color:#666; font-size:14px; }
        .no-data { text-align:center; padding:40px 0; color:#555; }
        .quick-actions { display:flex; gap:12px; padding:8px 16px; background:#0f0f0f; border-bottom:1px solid #1a1a1a; flex-shrink:0; }
        .quick-actions .qa-btn { background:#1a1a1a; border:1px solid #2a2a2a; color:#aaa; padding:6px 18px; border-radius:20px; font-size:12px; cursor:pointer; }
        .quick-actions .qa-btn:active { background:#2a2a2a; }
    </style>
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="login-screen" class="screen active">
    <div class="login-box">
        <h1>DuplexPlay</h1>
        <label>Sunucu (Demo)</label>
        <input type="text" id="server-input" value="demo-server">
        <label>Port</label>

        <label>Kullanıcı Adı</label>
        <input type="text" id="username-input" value="demo">
        <label>Şifre</label>
        <input type="password" id="password-input" value="demo">
        <button class="btn" onclick="loginAction()">Giriş Yap (Demo)</button>

    </div>
</div>

<!-- ANA EKRAN -->
<div id="main-screen" class="screen">

        <span class="logo">DuplexPlay</span>
        <span class="time" id="header-time">--:--</span>
        <button class="settings-btn" id="settings-open">⚙</button>
    </div>
    <div class="quick-actions">
        <button class="qa-btn" id="recent-btn">Son çalınanlar</button>

    </div>
    <div class="content" id="content-area">
        <div id="dynamic-content"></div>
    </div>
</div>

<!-- OYNATICI -->
<div id="player-screen" class="screen">
    <div class="video-wrap">
        <video id="player-video" controls autoplay></video>
        <button class="player-close" id="player-close">✕</button>
    </div>
    <div class="player-controls">
        <div class="title" id="player-title">Demo Yayın</div>
        <div class="epg" id="player-epg">Demo EPG - Örnek veri</div>
    </div>
</div>

<!-- AYARLAR -->
<div id="settings-screen" class="screen">
    <h2>Ayarlar</h2>
    <div class="settings-item"><span class="label">Dil</span><span class="value">Türkçe</span></div>
    <div class="settings-item"><span class="label">Arka fon</span><span class="value">Koyu</span></div>
    <div class="settings-item"><span class="label">Küçük Resim Kalitesi</span><span class="value">Orta</span></div>
    <div class="settings-item"><span class="label">Sıralama</span><span class="value">Varsayılan</span></div>
    <button class="settings-close" id="settings-close">Kapat</button>
</div>

var demoSeriesCategories = [
    { category_id: 20, category_name: 'Yabancı Diziler' },

    { stream_id: 2001, name: 'Breaking Bad', category_id: 20, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=Breaking+Bad', rating: '4.9' },
    { stream_id: 2002, name: 'Game of Thrones', category_id: 20, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=GOT', rating: '4.8' },
    { stream_id: 2003, name: 'The Walking Dead', category_id: 20, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=TWD', rating: '4.4' },
    { stream_id: 2004, name: 'Kara Para Aşk', category_id: 21, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=Kara+Para', rating: '4.6' },
    { stream_id: 2005, name: 'Behzat Ç.', category_id: 21, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=Behzat+Ç', rating: '4.7' },
    { stream_id: 2006, name: 'Fi', category_id: 22, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=Fi', rating: '4.0' },
    { stream_id: 2007, name: 'The Mandalorian', category_id: 23, stream_icon: 'https://via.placeholder.com/200x112/1a1a1a/00bfff?text=Mandalorian', rating: '4.8' }
];

// ---- Global değişkenler ----
var liveStreams = [];
var vodStreams = [];
var seriesStreams = [];
var liveCategories = [];
var vodCategories = [];
var seriesCategories = [];
var currentTab = 'live';
var currentCategoryId = 0;
var currentCategoryName = 'Tümü';

var loginScreen = document.getElementById('login-screen');
var mainScreen = document.getElementById('main-screen');
var playerScreen = document.getElementById('player-screen');
var settingsScreen = document.getElementById('settings-screen');

var loginStatus = document.getElementById('login-status');
var headerTime = document.getElementById('header-time');
var settingsOpen = document.getElementById('settings-open');
var settingsClose = document.getElementById('settings-close');
var recentBtn = document.getElementById('recent-btn');
var favoritesBtn = document.getElementById('favorites-btn');

var tabs = document.getElementsByClassName('tab');
var contentArea = document.getElementById('dynamic-content');

var playerVideo = document.getElementById('player-video');
var playerTitle = document.getElementById('player-title');
var playerEpg = document.getElementById('player-epg');
var playerClose = document.getElementById('player-close');

function showScreen(id) {
    var screens = document.getElementsByClassName('screen');
    for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove('active');
    }
    document.getElementById(id).classList.add('active');
}

function formatTime() {
    var d = new Date();
    var h = d.getHours();
    var m = d.getMinutes();
    var s = d.getSeconds();
    return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function updateClock() { headerTime.textContent = formatTime(); }
setInterval(updateClock, 1000);
updateClock();

function escapeHtml(text) {
    if (!text) return '';
    var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

// ---- Demo verileri yükle ----
function loadDemoData() {
    liveCategories = demoLiveCategories.slice(0);
    liveStreams = demoLiveStreams.slice(0);
    vodCategories = demoVodCategories.slice(0);
    vodStreams = demoVodStreams.slice(0);
    seriesCategories = demoSeriesCategories.slice(0);
    seriesStreams = demoSeriesStreams.slice(0);
}

// ---- Giriş aksiyonu (demo) ----
function loginAction() {
    loginStatus.textContent = '🌟 Demo mod: Veriler yükleniyor...';
    loginStatus.style.color = '#ffb347';
    console.log('Demo giriş yapılıyor...');
    loadDemoData();
    setTimeout(function() {
        loginStatus.textContent = '✅ Demo giriş başarılı!';
        loginStatus.style.color = '#6bff6b';
        showScreen('main-screen');
        loadTab('live');
    }, 500);
}

// ---- Tab ve kategori görünümü ----
function loadTab(tab) {
    currentTab = tab;
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
        if (tabs[i].getAttribute('data-tab') === tab) {
            tabs[i].classList.add('active');
        }
    }
    currentCategoryId = 0;
    currentCategoryName = 'Tümü';
    renderCategoryView(tab);
}

function renderCategoryView(tab) {
    var catList = [];
    var title = '';
    if (tab === 'live') { catList = liveCategories; title = 'Canlı Kategoriler (Demo)'; }
    else if (tab === 'vod') { catList = vodCategories; title = 'Film Kategorileri (Demo)'; }
    else if (tab === 'series') { catList = seriesCategories; title = 'Dizi Kategorileri (Demo)'; }
    else if (tab === 'catchup') { catList = liveCategories; title = 'Yeniden oynatma (Demo)'; }

    if (catList.length === 0) {
        catList = [{ category_id: 0, category_name: 'Tümü' }];
    }

    var html = '<h2>' + title + '</h2>';
    html += '<div class="cat-grid">';
    html += '<div class="cat-item active" data-cat-id="0" data-cat-name="Tümü">Tümü</div>';
    for (var i = 0; i < catList.length; i++) {
        var cat = catList[i];
        var catId = cat.category_id || cat.id || i+1;
        html += '<div class="cat-item" data-cat-id="' + catId + '" data-cat-name="' + escapeHtml(cat.category_name || 'Kategori') + '">' + escapeHtml(cat.category_name || 'Kategori') + '</div>';
    }
    html += '</div><div id="stream-list-container"></div>';
    contentArea.innerHTML = html;

    var catItems = contentArea.getElementsByClassName('cat-item');
    for (var j = 0; j < catItems.length; j++) {
        catItems[j].addEventListener('click', function(e) {
            var target = e.currentTarget;
            var all = contentArea.getElementsByClassName('cat-item');
            for (var k = 0; k < all.length; k++) all[k].classList.remove('active');
            target.classList.add('active');
            var catId = parseInt(target.getAttribute('data-cat-id'), 10);
            var catName = target.getAttribute('data-cat-name');
            currentCategoryId = catId;
            currentCategoryName = catName;
            renderStreams(tab, catId);
        });
    }
    renderStreams(tab, 0);
}

function renderStreams(tab, categoryId) {
    var streams = [];
    if (tab === 'live') streams = liveStreams;
    else if (tab === 'vod') streams = vodStreams;
    else if (tab === 'series') streams = seriesStreams;
    else if (tab === 'catchup') streams = liveStreams;

    var filtered = [];
    for (var i = 0; i < streams.length; i++) {
        var s = streams[i];
        var catId = s.category_id || 0;
        if (categoryId === 0 || catId === categoryId) {
            filtered.push(s);
        }
    }

    var container = document.getElementById('stream-list-container');
    if (!container) return;
    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-data">Bu kategoride yayın yok (demo).</div>';
        return;
    }

    var html = '<div class="stream-grid">';
    for (var j = 0; j < filtered.length; j++) {
        var item = filtered[j];
        var name = item.name || 'İsimsiz';
        var icon = item.stream_icon || '';
        var id = item.stream_id || item.id || 'id_' + j;
        var type = 'live';
        if (tab === 'vod') type = 'movie';
        if (tab === 'series') type = 'series';
        if (tab === 'catchup') type = 'catchup';

        html += '<div class="stream-card" data-id="' + id + '" data-type="' + type + '" data-name="' + escapeHtml(name) + '" data-icon="' + escapeHtml(icon) + '">';
        html += '<div class="thumb">';
        if (icon) html += '<img src="' + escapeHtml(icon) + '" alt="" onerror="this.style.display=\'none\'">';
        else html += '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#555;">No Image</div>';
        html += '</div><div class="info"><div class="title">' + escapeHtml(name) + '</div>';
        if (item.rating) html += '<div class="sub">⭐ ' + item.rating + '</div>';
        html += '</div></div>';
    }
    html += '</div>';
    container.innerHTML = html;

    var cards = container.getElementsByClassName('stream-card');
    for (var k = 0; k < cards.length; k++) {
        cards[k].addEventListener('click', function(e) {
            var card = e.currentTarget;
            var id = card.getAttribute('data-id');
            var type = card.getAttribute('data-type');
            var name = card.getAttribute('data-name');
            playDemoStream(id, type, name);
        });
    }
}

// ---- Demo oynatma ----
function playDemoStream(id, type, name) {
    showScreen('player-screen');
    playerTitle.textContent = name || 'Demo Yayın';
    playerEpg.textContent = 'Demo EPG - Örnek yayın akışı';

    // Demo video olarak örnek bir video kullan (Big Buck Bunny)
    var demoUrl = 'https://www.w3schools.com/html/mov_bbb.mp4';
    playerVideo.src = demoUrl;
    playerVideo.load();
    playerVideo.play();

    // Sahte EPG
    setTimeout(function() {
        playerEpg.textContent = '📺 ' + name + ' - Şu an: Demo programı (19:00-20:00)';
    }, 1000);
}

// ---- Diğer olaylar ----
settingsOpen.addEventListener('click', function() { showScreen('settings-screen'); });
settingsClose.addEventListener('click', function() { showScreen('main-screen'); });
playerClose.addEventListener('click', function() {
    playerVideo.pause();
    playerVideo.src = '';
    showScreen('main-screen');
});
recentBtn.addEventListener('click', function() { alert('Son çalınanlar (Demo) - Henüz uygulanmadı.'); });
favoritesBtn.addEventListener('click', function() { alert('Sık kullanılanlar (Demo) - Henüz uygulanmadı.'); });

for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function() {
        loadTab(this.getAttribute('data-tab'));
    });
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && loginScreen.classList.contains('active')) {
        loginAction();
