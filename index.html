<script>

var baseUrl = '';
var isM3U = false;               // M3U modunda mı?

var loginScreen = document.getElementById('login-screen');

function showScreen(id) {
    var screens = document.getElementsByClassName('screen');
    for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove('active');
    }
    document.getElementById(id).classList.add('active');
}

function formatTime() {
    var d = new Date();
    var h = d.getHours();
    var m = d.getMinutes();
    var s = d.getSeconds();
    return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function updateClock() { headerTime.textContent = formatTime(); }
setInterval(updateClock, 1000);
updateClock();

function getParameterByName(url, name) {
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
    var results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

function escapeHtml(text) {
    if (!text) return '';
    var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

// ---- Xtream API isteği (zaman aşımı + hata) ----
function xtreamRequest(endpoint, callback) {
    var fullUrl = baseUrl + '&' + endpoint;
    var xhr = new XMLHttpRequest();
    var isDone = false;
    var timeoutId = setTimeout(function() {
        if (!isDone) {
            isDone = true;
            callback('Zaman aşımı (15 sn)', null);
        }
    }, 15000);

    xhr.open('GET', fullUrl, true);
    xhr.onreadystatechange = function() {
        if (isDone) return;
        if (xhr.readyState === 4) {
            clearTimeout(timeoutId);
            isDone = true;
            if (xhr.status === 200) {
                try {
                    var data = JSON.parse(xhr.responseText);
                    callback(null, data);
                } catch(e) {
                    callback('JSON hatası: ' + e.message, null);
                }
            } else {
                callback('HTTP ' + xhr.status + ' ' + xhr.statusText, null);
            }
        }
    };
    xhr.onerror = function() {
        if (!isDone) {
            clearTimeout(timeoutId);
            isDone = true;
            callback('Ağ hatası (CORS veya bağlantı sorunu)', null);
        }
    };
    xhr.send();
}

// ---- M3U dosyasını indir ve parse et ----
function loadM3U(url, callback) {
    var xhr = new XMLHttpRequest();
    var isDone = false;
    var timeoutId = setTimeout(function() {
        if (!isDone) {
            isDone = true;
            callback('Zaman aşımı (15 sn) - M3U indirilemedi', null);
        }
    }, 15000);

    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
        if (isDone) return;
        if (xhr.readyState === 4) {
            clearTimeout(timeoutId);
            isDone = true;
            if (xhr.status === 200) {
                callback(null, xhr.responseText);
            } else {
                callback('HTTP ' + xhr.status + ' M3U indirilemedi', null);
            }
        }
    };
    xhr.onerror = function() {
        if (!isDone) {
            clearTimeout(timeoutId);
            isDone = true;
            callback('Ağ hatası - M3U indirilemedi', null);
        }
    };
    xhr.send();
}

// ---- M3U parse et ----
function parseM3U(data) {
    var lines = data.split(/\r?\n/);
    var streams = [];
    var categoriesMap = {};
    var categoryIdCounter = 0;
    var currentExtinf = null;

    for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (line.indexOf('#EXTINF') === 0) {
            // #EXTINF:0 group-title="..." logo="..." , Kanal Adı
            var info = line;
            var name = '';
            var group = 'Diğer';
            var logo = '';
            // Adı virgülden sonra al
            var commaIdx = info.lastIndexOf(',');
            if (commaIdx !== -1) {
                name = info.substring(commaIdx + 1).trim();
            }
            // group-title
            var groupMatch = info.match(/group-title="([^"]*)"/);
            if (groupMatch) group = groupMatch[1] || 'Diğer';
            // logo (tvg-logo)
            var logoMatch = info.match(/tvg-logo="([^"]*)"/);
            if (logoMatch) logo = logoMatch[1] || '';
            // stream_id yok, kendimiz bir id verelim (index)
            var streamId = 'm3u_' + i;
            currentExtinf = {
                id: streamId,
                name: name || 'İsimsiz',
                group: group,
                logo: logo,
                url: ''
            };
        } else if (line && line.indexOf('#') !== 0 && currentExtinf) {
            // Bu satır akış URL'si
            currentExtinf.url = line;
            // Kategori ID'sini al veya oluştur
            var catId = categoriesMap[group];
            if (catId === undefined) {
                categoryIdCounter++;
                catId = categoryIdCounter;
                categoriesMap[group] = catId;
                // liveCategories'e ekle
                liveCategories.push({
                    category_id: catId,
                    category_name: group
                });
            }
            // stream'i ekle
            streams.push({
                stream_id: currentExtinf.id,
                name: currentExtinf.name,
                category_id: catId,
                stream_icon: currentExtinf.logo,
                url: currentExtinf.url
            });
            currentExtinf = null;
        }
    }

    // Eğer hiç kategori yoksa varsayılan ekle
    if (liveCategories.length === 0) {
        liveCategories.push({ category_id: 1, category_name: 'Tümü' });
    }

    return streams;
}

// ---- M3U girişi ----
function doLoginM3U(m3uUrl) {
    loginStatus.textContent = 'M3U indiriliyor...';
    loginStatus.style.color = '#ffb347';
    loadM3U(m3uUrl, function(err, data) {
        if (err) {
            loginStatus.textContent = 'Hata: ' + err;
            loginStatus.style.color = '#ff6b6b';
            return;
        }
        try {
            m3uStreams = parseM3U(data);
            // liveStreams'i M3U stream'leriyle doldur
            liveStreams = m3uStreams.slice(0); // kopyala
            // vod ve series boş
            vodStreams = [];
            seriesStreams = [];
            vodCategories = [];
            seriesCategories = [];

            loginStatus.textContent = 'M3U başarıyla yüklendi (' + liveStreams.length + ' kanal)';
            loginStatus.style.color = '#6bff6b';
            setTimeout(function() {
                showScreen('main-screen');
                loadTab('live');
            }, 400);
        } catch (e) {
            loginStatus.textContent = 'M3U parse hatası: ' + e.message;
            loginStatus.style.color = '#ff6b6b';
        }
    });
}

// ---- Xtream API giriş (mevcut) ----
function doLogin(server, port, username, password) {
    baseUrl = 'http://' + server + ':' + port + '/player_api.php?username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password);
    loginStatus.textContent = 'Bağlanıyor...';
    loginStatus.style.color = '#ffb347';
    console.log('doLogin -> baseUrl=' + baseUrl);

    fetchAllData(function() {
        if (liveStreams.length === 0 && vodStreams.length === 0 && seriesStreams.length === 0) {
            loginStatus.textContent = 'Sunucudan veri alınamadı. Lütfen bilgileri kontrol edin.';
            loginStatus.style.color = '#ff6b6b';
            return;
        }
        loginStatus.textContent = 'Giriş başarılı!';
        loginStatus.style.color = '#6bff6b';
        setTimeout(function() {
            showScreen('main-screen');
            loadTab('live');
        }, 400);
    });
}

// ---- fetchAllData (mevcut) ----
function fetchAllData(callback) {
    var completed = 0;
    var total = 3;
    var hasError = false;

    function checkDone() {
        completed++;
        if (completed >= total) {
            callback();
        }
    }

    // Zorunlu zaman aşımı
    var forceCallback = setTimeout(function() {
        console.warn('fetchAllData zorunlu zaman aşımı');
        callback();
    }, 15000);

    var safeCallback = function() {
        clearTimeout(forceCallback);
        callback();
    };

    var originalCheckDone = checkDone;
    checkDone = function() {
        completed++;
        if (completed >= total) {
            safeCallback();
        }
    };

    // Canlı
    xtreamRequest('action=get_live_streams', function(err, data) {
        if (!err && data && data.live_streams) {
            liveStreams = data.live_streams;
        } else {
            liveStreams = [];
            console.warn('Canlı akış hatası:', err);
        }
        xtreamRequest('action=get_live_categories', function(err2, catData) {
            if (!err2 && catData && catData.categories) {
                liveCategories = catData.categories;
            } else {
                liveCategories = [];
            }
            checkDone();
        });
    });

    // VOD
    xtreamRequest('action=get_vod_streams', function(err, data) {
        if (!err && data && data.vod_streams) {
            vodStreams = data.vod_streams;
        } else {
            vodStreams = [];
        }
        xtreamRequest('action=get_vod_categories', function(err2, catData) {
            if (!err2 && catData && catData.categories) {
                vodCategories = catData.categories;
            } else {
                vodCategories = [];
            }
            checkDone();
        });
    });

    // Diziler
    xtreamRequest('action=get_series_streams', function(err, data) {
        if (!err && data && data.series_streams) {
            seriesStreams = data.series_streams;
        } else {
            seriesStreams = [];
        }
        xtreamRequest('action=get_series_categories', function(err2, catData) {
            if (!err2 && catData && catData.categories) {
                seriesCategories = catData.categories;
            } else {
                seriesCategories = [];
            }
            checkDone();
        });
    });
}

// ---- Tab ve kategori görünümü ----
function loadTab(tab) {
    currentTab = tab;
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
        if (tabs[i].getAttribute('data-tab') === tab) {
            tabs[i].classList.add('active');
        }
    }
    currentCategoryId = 0;
    currentCategoryName = 'Tümü';
    renderCategoryView(tab);
}

function renderCategoryView(tab) {
    var catList = [];
    var title = '';
    if (tab === 'live') { catList = liveCategories; title = 'Canlı Kategoriler'; }
    else if (tab === 'vod') { catList = vodCategories; title = 'Film Kategorileri'; }
    else if (tab === 'series') { catList = seriesCategories; title = 'Dizi Kategorileri'; }
    else if (tab === 'catchup') { catList = liveCategories; title = 'Yeniden oynatma (Catch-up)'; }

    // Eğer kategori yoksa varsayılan ekle
    if (catList.length === 0) {
        catList = [{ category_id: 0, category_name: 'Tümü' }];
    }

    var html = '<h2>' + title + '</h2>';
    html += '<div class="cat-grid">';
    html += '<div class="cat-item active" data-cat-id="0" data-cat-name="Tümü">Tümü</div>';
    for (var i = 0; i < catList.length; i++) {
        var cat = catList[i];
        var catId = cat.category_id || cat.id || i+1;
        html += '<div class="cat-item" data-cat-id="' + catId + '" data-cat-name="' + escapeHtml(cat.category_name || 'Kategori') + '">' + escapeHtml(cat.category_name || 'Kategori') + '</div>';
    }
    html += '</div><div id="stream-list-container"></div>';
    contentArea.innerHTML = html;

    var catItems = contentArea.getElementsByClassName('cat-item');
    for (var j = 0; j < catItems.length; j++) {
        catItems[j].addEventListener('click', function(e) {
            var target = e.currentTarget;
            var all = contentArea.getElementsByClassName('cat-item');
            for (var k = 0; k < all.length; k++) all[k].classList.remove('active');
            target.classList.add('active');
            var catId = parseInt(target.getAttribute('data-cat-id'), 10);
            var catName = target.getAttribute('data-cat-name');
            currentCategoryId = catId;
            currentCategoryName = catName;
            renderStreams(tab, catId);
        });
    }
    renderStreams(tab, 0);
}

function renderStreams(tab, categoryId) {
    var streams = [];
    if (tab === 'live') streams = liveStreams;
    else if (tab === 'vod') streams = vodStreams;
    else if (tab === 'series') streams = seriesStreams;
    else if (tab === 'catchup') streams = liveStreams;

    // M3U modunda category_id kontrolü (stream'lerde category_id var)
    var filtered = [];
    for (var i = 0; i < streams.length; i++) {
        var s = streams[i];
        var catId = s.category_id || 0;
        if (categoryId === 0 || catId === categoryId) {
            filtered.push(s);
        }
    }

    var container = document.getElementById('stream-list-container');
    if (!container) return;
    if (filtered.length === 0) {
        container.innerHTML = '<div class="no-data">Bu kategoride yayın yok.</div>';
        return;
    }

    var html = '<div class="stream-grid">';
    for (var j = 0; j < filtered.length; j++) {
        var item = filtered[j];
        var name = item.name || 'İsimsiz';
        var icon = item.stream_icon || '';
        var id = item.stream_id || item.id || 'id_' + j;
        var type = 'live';
        if (tab === 'vod') type = 'movie';
        if (tab === 'series') type = 'series';
        if (tab === 'catchup') type = 'catchup';

        html += '<div class="stream-card" data-id="' + id + '" data-type="' + type + '" data-name="' + escapeHtml(name) + '" data-icon="' + escapeHtml(icon) + '" data-url="' + escapeHtml(item.url || '') + '">';
        html += '<div class="thumb">';
        if (icon) html += '<img src="' + escapeHtml(icon) + '" alt="" onerror="this.style.display=\'none\'">';
        else html += '<div style="width:100%;height:100%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#555;">No Image</div>';
        html += '</div><div class="info"><div class="title">' + escapeHtml(name) + '</div>';
        if (item.rating) html += '<div class="sub">⭐ ' + item.rating + '</div>';
        html += '</div></div>';
    }
    html += '</div>';
    container.innerHTML = html;

    var cards = container.getElementsByClassName('stream-card');
    for (var k = 0; k < cards.length; k++) {
        cards[k].addEventListener('click', function(e) {
            var card = e.currentTarget;
            var id = card.getAttribute('data-id');
            var type = card.getAttribute('data-type');
            var name = card.getAttribute('data-name');
            var url = card.getAttribute('data-url');
            playStream(id, type, name, url);
        });
    }
}

// ---- Oynatma (url parametresi eklendi) ----
function playStream(id, type, name, url) {
    showScreen('player-screen');
    playerTitle.textContent = name || 'Yayın';
    playerEpg.textContent = 'EPG yükleniyor...';

    var finalUrl = '';
    if (url && url.length > 0) {
        // M3U modunda doğrudan URL kullan
        finalUrl = url;
    } else {
        // Xtream API modu: URL'yi oluştur
        var server = serverInput.value;
        var port = portInput.value;
        var username = usernameInput.value;
        var password = passwordInput.value;
        if (type === 'live' || type === 'catchup') {
            finalUrl = 'http://' + server + ':' + port + '/live/' + encodeURIComponent(username) + '/' + encodeURIComponent(password) + '/' + id + '.ts';
        } else if (type === 'movie') {
            finalUrl = 'http://' + server + ':' + port + '/movie/' + encodeURIComponent(username) + '/' + encodeURIComponent(password) + '/' + id + '.ts';
        } else {
            alert('Bu içerik türü henüz desteklenmiyor.');
            showScreen('main-screen');
            return;
        }
    }

    playerVideo.src = finalUrl;
    playerVideo.load();
    playerVideo.play();

    if (type === 'live' || type === 'catchup') {
        // EPG dene (sadece Xtream API için)
        if (!isM3U && baseUrl) {
            xtreamRequest('action=get_short_epg&stream_id=' + id, function(err, data) {
                if (!err && data && data.epg_data) {
                    var epgText = '';
                    for (var i = 0; i < data.epg_data.length; i++) {
                        var ep = data.epg_data[i];
                        epgText += ep.title + ' (' + ep.start + '-' + ep.end + ') ';
                    }
                    playerEpg.textContent = epgText || 'EPG verisi yok';
                } else {
                    playerEpg.textContent = 'EPG verisi yok';
                }
            });
        } else {
            playerEpg.textContent = 'EPG verisi yok (M3U)';
        }
    } else {
        playerEpg.textContent = 'VOD - ' + name;
    }
}

// ---- Olaylar ----
loginBtn.addEventListener('click', function() {
    var server = serverInput.value.trim();
    var port = portInput.value.trim();
    var username = usernameInput.value.trim();
    var password = passwordInput.value.trim();
    if (!server || !port || !username || !password) {
        loginStatus.textContent = 'Lütfen tüm alanları doldurun.';
        loginStatus.style.color = '#ff6b6b';
        return;
    }
    isM3U = false;
    doLogin(server, port, username, password);
});

urlLoginBtn.addEventListener('click', function() {
    var url = urlInput.value.trim();
    if (!url) {
        loginStatus.textContent = 'Lütfen geçerli bir URL girin.';
        loginStatus.style.color = '#ff6b6b';
        return;
    }

    // M3U mu kontrol et
    if (url.indexOf('get.php') !== -1 || url.indexOf('m3u') !== -1) {
        // M3U modu
        isM3U = true;
        // Sunucu, port, username, password'yi inputlara yaz (opsiyonel)
        var match = url.match(/^https?:\/\/([^\/:]+)(?::(\d+))?/);
        if (match) {
            serverInput.value = match[1];
            portInput.value = match[2] || '80';
        }
        var u = getParameterByName(url, 'username');
        var p = getParameterByName(url, 'password');
        if (u) usernameInput.value = u;
        if (p) passwordInput.value = p;
        // M3U yükle
        doLoginM3U(url);
    } else {
        // Xtream API dene
        isM3U = false;
        var username = getParameterByName(url, 'username');
        var password = getParameterByName(url, 'password');
        var match = url.match(/^https?:\/\/([^\/:]+)(?::(\d+))?/);
        if (match && username && password) {
            var server = match[1];
            var port = match[2] || '80';
            serverInput.value = server;
            portInput.value = port;
            usernameInput.value = username;
            passwordInput.value = password;
            doLogin(server, port, username, password);
        } else {
            loginStatus.textContent = 'URL'den bilgiler alınamadı. Lütfen manuel girin.';
            loginStatus.style.color = '#ff6b6b';
        }
    }
});

for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function() {
        loadTab(this.getAttribute('data-tab'));
    });
}

settingsOpen.addEventListener('click', function() { showScreen('settings-screen'); });
settingsClose.addEventListener('click', function() { showScreen('main-screen'); });
playerClose.addEventListener('click', function() {
    playerVideo.pause();
    playerVideo.src = '';
    showScreen('main-screen');
});
recentBtn.addEventListener('click', function() { alert('Son çalınanlar listesi henüz uygulanmadı.'); });
favoritesBtn.addEventListener('click', function() { alert('Sık kullanılanlar yöneticisi henüz uygulanmadı.'); });

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && loginScreen.classList.contains('active')) {
        loginBtn.click();
    }
});

console.log('DuplexPlay başlatıldı (ES5) - M3U/API destekli');
